name: False-positive diagnostic
description: Report an inspection warning that should not be shown.
title: "[False positive]: "
labels: ["diagnostic", "false-positive"]
body:
  - type: input
    id: plugin-version
    attributes:
      label: Frappe Inspector version
    validations:
      required: true
  - type: textarea
    id: code
    attributes:
      label: Minimal code or project structure
      description: Remove private business data before posting.
      render: text
    validations:
      required: true
  - type: textarea
    id: warning
    attributes:
      label: Warning shown by Frappe Inspector
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why it is valid Frappe code
    validations:
      required: true
