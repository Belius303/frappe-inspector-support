name: Bug report
description: Report a reproducible Frappe Inspector bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: plugin-version
    attributes:
      label: Frappe Inspector version
      placeholder: "1.0.2"
    validations:
      required: true
  - type: input
    id: ide-version
    attributes:
      label: JetBrains IDE and version
      placeholder: "PyCharm Professional 2026.1.4"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the smallest project structure or code snippet that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
